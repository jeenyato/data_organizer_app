<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"content="width=device-width,initial-scale=1">
    <title>Drive Research Manager</title>
    <script type="module">import 'https://unpkg.com/mathlive';</script>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            direction: rtl;
            font-family:Arial;
        }
        #loader{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:#111827;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            z-index:9999;
            transition:opacity .5s;
        }
        .spinner{
            width:80px;
            height:80px;
            border:6px solid #374151;
            border-top:6px solid #2563eb;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin-bottom:20px;
        }
        @keyframes spin{
            0%{
                transform:rotate(0deg);
            }
            100%{
                transform:rotate(360deg);
            }
        }
        .loadingText{
            font-size:22px;
            opacity:.85;
        }
        body{
            font-family:Arial;
            background:#111827;
            color:white;
            margin:0;
            padding: 0;
            height:100vh;
            display:flex;
            flex-direction:column;
        }
        header{
            padding:14px;
            background:#1f2937;
            font-size:20px;
            font-weight:bold;
            border-bottom:1px solid #374151;
        }
        .toolbar{
            padding:10px;
            display:flex;
            gap:10px;
            background:#1f2937;
        }
        h1{
            text-align:center;
            margin:0;
            padding:0px;
        }
        .top{
            display:flex;
            flex-wrap:wrap;
            justify-content:center; 
            align-items:center;  
        }
        button,input{
            padding:10px;
            border:none;
            border-radius:10px;
        }
        button,input{
            background:#2563eb;
            color:white;
            cursor:pointer;
        }
        button:hover{
            background:#1d4ed8;
        }
        #cards{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
            gap:15px;
        }
        .card{
            background:#1f2937;
            padding:15px;
            border-radius:15px;
            box-shadow:0 0 10px black;
        }
        .small{
            opacity:.7;
            font-size:12px;
        }
        .actions{
            display:flex;
            gap:8px;
            margin-top:10px;
            flex-wrap:wrap;
        }
        .rename{
            background:#eab308;
        }
        .delete{
            background:#dc2626;
        }
        .download{
            background:#16a34a;
        }
        .headering{
            background-color: #1f2937;
            padding: 0px;
            margin: 0;
        }
        .buttoniniditor{
            border:none;
            background:#2563eb;
            color:white;
            padding:10px 14px;
            border-radius:10px;
            font-size:15px;
        }
        #editor{
            flex:1;
            padding:18px;
            outline:none;
            overflow:auto;
            font-size:18px;
            line-height:1.7;
        }
        #editor:empty::before{
            content:"ابدأ بالكتابة هنا...";
            color:#6b7280;
        }
        .equation{
            display:inline-block;
            padding:4px 6px;
            margin:0 3px;
            background:#1f2937;
            border-radius:8px;
        }
        #equationPanel{
            background:#1f2937;
            padding:18px;
            border-top:2px solid #374151;
            display:none;
        }
        math-field{
            width:100%;
            font-size:28px;
            padding:12px;
            border-radius:10px;
            margin-bottom:12px;
        }
        .insert{
            width:100%;
            background:#16a34a;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div class="loadingText">جاري التحميل...</div>
    </div>
    <div id="content1" style="display:none;">
        <div class="headering">
            <br><h1>ملفات البحث العلمي</h1><br>
            <div class="top">
                <center>
                    <div>
                        <center>
                            <button id="login" style="width: 32%;">سجل دخول</button>
                            <button id="refresh" style="width: 32%;">تحديث</button>
                            <button id="edit_emw_file" style="width: 32%;">إنشاء ملف</button>
                        </center>
                    </div><br>
                    <input type="file" id="upload"><br><br>
                </center>
            </div>
        </div><br><br>
        <div id="cards"></div><br><br>
    </div>
    <div id="content2" style="display:none;">
        <header>📜محرر نصوص للبحث</header>
            <div class="toolbar">
                <button class="buttoniniditor" onclick="openEquation()">+ معادله</button>
                <button class="buttoniniditor" onclick="savealldata()" style="background: #16a34a;">احفظ</button>
                <button class="buttoniniditor" onclick="salldata()" style="background:crimson;">امسح</button>
                <button class="buttoniniditor" onclick="undothat()" style="background:darkorange;">تراجع خطوه</button>
            </div>
            <div id="editor" contenteditable="true"></div>
            <div id="equationPanel">
                <math-field id="mathInput">\frac{a}{b}</math-field>
                <button class="buttoniniditor insert" onclick="insertEquation()">اضافه المعادله</button>
            </div>
        </div>
    <script>
        const CLIENT_ID="1059917357836-7oop4rls49pto8fil203qkgab9vpe2eo.apps.googleusercontent.com"
        const API_KEY="AIzaSyDnnnWIj9RUJPFYj4qztAZD1B65wc2N8_k"
        const DISCOVERY="https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"
        const SCOPES="https://www.googleapis.com/auth/drive"
        let token=""
        let tokenClient=null
        let googleReady=false
        let gapiReady=false
        let initiolized=false
        function ready(){
            if(googleReady&&gapiReady&&!initiolized){
                initiolized=true
                initialize()
            }
        }
        function googleLoaded(){
            googleReady=true
            ready()
        }
        function gapiLoaded(){
            gapiReady=true
            gapi.load("client",ready)
        }
        async function initialize(){
            try{
                await gapi.client.init({apiKey:API_KEY,discoveryDocs:[DISCOVERY]})
                tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:(resp)=>{token=resp.access_token;loadFiles()}})
                setTimeout(()=>{
                document.getElementById("loader").style.display="none";
                document.getElementById("content1").style.display="block";
            },500)
            }catch(e){
                console.error(e)
                alert("Init failed")
            }
        }
        edit_emw_file.onclick=()=>{
            if(!token){
                alert("سجل دخول الأول");
                return;
            }
            document.getElementById("content1").style.display="none";
            document.getElementById("content2").style.display="block";
        }
        function salldata(){
            if(confirm("هل أنت متأكد من مسح كل المحتوى؟")){
                editor.innerHTML="";
                document.getElementById("content1").style.display="block";
                document.getElementById("content2").style.display="none";
            }
        }
        async function savealldata(){
            if(!token){
                alert("سجل دخول الأول");
                return;
            }
            const content = editor.innerHTML;
            const blob = new Blob(
                [content],
                {type:"text/html"}
            );
            const form = new FormData();
            form.append("metadata",new Blob([JSON.stringify({name:"بحث جديد.html"})],{type:"application/json"}));
            form.append("file",blob,"بحث جديد.html");
            document.getElementById("loader").style.display="flex";
            document.getElementById("content2").style.display="none";
            await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
                {
                    method:"POST",
                    headers:{
                        Authorization:"Bearer "+token
                    },
                    body:form
                }
            );
            loadFiles();
            document.getElementById("content1").style.display="block";
            document.getElementById("loader").style.display="none";
        }
        let savedRange=null;
        const editor=document.getElementById("editor");
        function saveCursor(){
            let sel=window.getSelection();
            if(sel.rangeCount){
                savedRange=sel.getRangeAt(0);
            }
        }
        editor.addEventListener("keyup",saveCursor);
        editor.addEventListener("mouseup",saveCursor);
        editor.addEventListener("touchend",saveCursor);
        function undothat(){
            editor.focus();
            document.execCommand("undo");
        }
        function openEquation(){
            saveCursor();
            document.getElementById("equationPanel").style.display="block";
            editor.style.display="none";
        }
        function insertEquation(){
            const latex=document.getElementById("mathInput").value;
            const equation=document.createElement("span");
            equation.className="equation";
            equation.innerHTML=`<math-field read-only>${latex}</math-field>`;
            if(savedRange){
                savedRange.insertNode(equation);
                savedRange.setStartAfter(equation);
                savedRange.collapse(true);
                let sel=window.getSelection();
                sel.removeAllRanges();
                sel.addRange(savedRange);
            }
            document.getElementById("equationPanel").style.display="none";
            editor.style.display="block";
            editor.focus();
        }
        login.onclick=()=>{
            if(!tokenClient){
                alert("Google loading...")
                return
            }
            tokenClient.requestAccessToken({prompt:"consent"})
        }
        refresh.onclick=()=>{
            if(!token){return}
            loadFiles()
        }
        upload.onchange=uploadFile
        async function loadFiles(){
            if(!token){return}
            try{
                const r=await gapi.client.drive.files.list({pageSize:100,fields:"files(id,name,size,modifiedTime)"})
                render(r.result.files)
            }
            catch(e){
                console.error(e)
            }
        }
        function render(files){
            cards.innerHTML=""
            files.forEach(file=>{
                const c=document.createElement("div")
                c.className="card"
                c.innerHTML=`
                    <h3>${file.name}</h3>
                    <div class="small">${format(file.size)}</div>
                    <div class="small">${new Date(file.modifiedTime).toLocaleString()}</div>
                    <div class="actions">
                        <button class="download" onclick="downloadFile('${file.id}')">تحميل</button>
                        <button class="rename" onclick="renameFile('${file.id}',\`${file.name}\`)">غير الاسم</button>
                        <button class="delete" onclick="deleteFile('${file.id}')">حذف</button>
                        <button class="edit" onclick="window.open('https://docs.google.com/document/d/${file.id}/edit')">تعديل</button>
                    </div>`
                cards.appendChild(c)
            })
        }
        async function uploadFile(){
            if(!token){return}
            const file=upload.files[0]
            if(!file){return}
            const meta={name:file.name}
            const form=new FormData()
            form.append("metadata",new Blob([JSON.stringify(meta)],{type:"application/json"}))
            form.append("file",file)
            document.getElementById("loader").style.display="flex";
            document.getElementById("content1").style.display="none";
            await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
                {
                    method:"POST",
                    headers:{
                        Authorization:"Bearer "+token
                    },
                    body:form
                }
            )
            document.getElementById("loader").style.display="none";
            document.getElementById("content1").style.display="block";
            document.getElementById("upload").value = "";
            loadFiles()
        }
        async function deleteFile(id){
            if(!confirm("Delete?")){return}
            await fetch(`https://www.googleapis.com/drive/v3/files/${id}`,
                {
                    method:"DELETE",
                    headers:{
                        Authorization:"Bearer "+token
                    }
                }
            )
            loadFiles()
        }
        async function renameFile(id,oldName){
            const newName=prompt("New name",oldName)
            if(!newName){return}
            await fetch(`https://www.googleapis.com/drive/v3/files/${id}`,
                {
                    method:"PATCH",
                    headers:{
                        Authorization:"Bearer "+token,
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({name:newName})
                }
            )
            loadFiles()
        }
        function downloadFile(id){
            window.open(`https://drive.google.com/uc?id=${id}&export=download`)
        }
        function format(bytes){
            if(!bytes){return "?"}
            bytes=Number(bytes)
            const units=["B","KB","MB","GB"]
            let i=0
            while(bytes>=1024&&i<3){
                bytes/=1024
                i++
            }
            return bytes.toFixed(1)+" "+units[i]
        }
    </script>
    <script src="https://accounts.google.com/gsi/client" onload="googleLoaded()"></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
</body>
</html>
