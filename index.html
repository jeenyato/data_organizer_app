    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            direction: rtl;
            font-family:Arial;
        }
        #loader{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:#111827;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            z-index:9999;
            transition:opacity .5s;
        }
        .spinner{
            width:80px;
            height:80px;
            border:6px solid #374151;
            border-top:6px solid #2563eb;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin-bottom:20px;
        }
        @keyframes spin{
            0%{
                transform:rotate(0deg);
            }
            100%{
                transform:rotate(360deg);
            }
        }
        .loadingText{
            font-size:22px;
            opacity:.85;
        }
        body{
            font-family:Arial;
            background:#111827;
            color:white;
            margin:0;
            padding: 0;
            height:100vh;
            display:flex;
            flex-direction:column;
        }
        header{
            padding:14px;
            background:#1f2937;
            font-size:20px;
            font-weight:bold;
            border-bottom:1px solid #374151;
        }
        .toolbar{
            padding:10px;

            gap:10px;
            background:#1f2937;

        .top{

        const CLIENT_ID="1059917357836-7oop4rls49pto8fil203qkgab9vpe2eo.apps.googleusercontent.com"

        const DISCOVERY="https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"
        const SCOPES="https://www.googleapis.com/auth/drive"

        function closeViewer(id){

                document.getElementById("pdfFrame").src="";

            if(id==="imageviewer"){

        }
        function ready(){
            if(googleReady&&gapiReady&&!initiolized){
                initiolized=true
                initialize()
            }
        }
        function googleLoaded(){
            googleReady=true
            ready()
        }
        function gapiLoaded(){
            gapiReady=true
            gapi.load("client",ready)
        }
        function logout(){
            localStorage.removeItem("drive_token");
            localStorage.removeItem("drive_token_expire");
            token="";
            tokenExpire=0;
            gapi.client.setToken("");
        }
        async function initialize(){
            try{
                await gapi.client.init({apiKey:API_KEY,discoveryDocs:[DISCOVERY]})
                tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,
                    callback:(resp)=>{
                        if(resp.error){
                            console.log(resp);
                            return;
                        }
                        token=resp.access_token;
                        const expireTime=Date.now()+(resp.expires_in*1000);
                        tokenExpire=expireTime;
                        localStorage.setItem("drive_token",token);
                        localStorage.setItem("drive_token_expire",expireTime);
                        gapi.client.setToken({
                            access_token:token
                        });
                        loadFiles();
                    }
                })
                if(token && Date.now()<tokenExpire){
                    gapi.client.setToken({
                        access_token:token
                    });
                    loadFiles();
                }
                setTimeout(()=>{
                    document.getElementById("loader").style.display="none";
                    document.getElementById("content1").style.display="block";
                },500)
            }catch(e){
                console.error(e)
                alert("Init failed")
            }
        }

        let savedRange=null;
        const editor=document.getElementById("editor");
        function saveCursor(){
            let sel=window.getSelection();
            if(sel.rangeCount){
                savedRange=sel.getRangeAt(0);
            }
        }
        editor.addEventListener("keyup",saveCursor);

        function insertEquation(){
            const latex=document.getElementById("mathInput").value;
            const equation=document.createElement("span");
            equation.className="equation";
            equation.innerHTML=`<math-field read-only>${latex}</math-field>`;
            if(savedRange){
                savedRange.insertNode(equation);
                savedRange.setStartAfter(equation);
                savedRange.collapse(true);
                let sel=window.getSelection();
                sel.removeAllRanges();
                sel.addRange(savedRange);
            }
            document.getElementById("equationPanel").style.display="none";
            editor.style.display="block";
            editor.focus();
        }

        async function openCSV(id){
            try{
                document.getElementById("content1").style.display="none";
                document.getElementById("loader").style.display="flex";
                const response=await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,
                    {
                        headers:{
                            Authorization:"Bearer "+token
                        }
                    }
                );
                const text=await response.text();
                const rows=parseCSV(text);
                let html=`
                <div class="tablewrapper">
                <table class="realtable">
                `;
                if(rows.length){
                    html+="<thead><tr>";
                    rows[0].forEach(col=>{
                        html+=`<th>${escapeHTML(col)}</th>`;
                    });
                    html+="</tr></thead>";
                    html+="<tbody>";
                    for(let i=1;i<rows.length;i++){
                        html+="<tr>";
                        rows[i].forEach(cell=>{
                            html+=`<td>${escapeHTML(cell)}</td>`;
                        });
                        html+="</tr>";
                    }
                    html+="</tbody>";
                }
                html+="</table></div>";
                document.getElementById("csvTable").innerHTML=html;
                document.getElementById("loader").style.display="none";
                document.getElementById("csvviewer").style.display="flex";
            }catch(e){
                console.error(e);
                alert("فشل فتح CSV");
            }
        }

        function escapeHTML(str){
            return str
            .replace(/&/g,"&amp;")
            .replace(/</g,"&lt;")
            .replace(/>/g,"&gt;")
            .replace(/"/g,"&quot;")
            .replace(/'/g,"&#039;");
        }
        function parseCSV(text){
            const lines=text.trim().split(/\r?\n/);
            if(!lines.length)return [];
            let delimiter=",";
            const firstLine=lines[0];
            if(firstLine.includes(";")){
                delimiter=";";
            }else if(firstLine.includes("\t")){
                delimiter="\t";
            }
            return lines.map(line=>{
                const result=[];
                let current="";
                let insideQuotes=false;
                for(let i=0;i<line.length;i++){
                    const char=line[i];
                    if(char === '"'){
                        insideQuotes=!insideQuotes;
                    }else if(char === delimiter && !insideQuotes){
                        result.push(current.trim());
                        current="";
                    }else{
                        current+=char;
                    }
                }
                result.push(current.trim());
                return result;
            });
        }

                const blob=await response.blob();
                const imageURL=URL.createObjectURL(blob);
                document.getElementById("viewedImage").src=imageURL;
                document.getElementById("loader").style.display="none";
                document.getElementById("imageviewer").style.display="flex";
            }catch(e){
                console.error(e);
                alert("فشل فتح الصورة");
                document.getElementById("loader").style.display="none";
                document.getElementById("content1").style.display="block";
            }
        }
        async function openfile(id,name){
            if(name.endsWith(".png")||name.endsWith(".jpg")||name.endsWith(".jpeg")||name.endsWith(".svg")){
                openImage(id);
                return;
            }
            if(name.endsWith(".mp4") ||name.endsWith(".webm") ||name.endsWith(".mov")){
                openVideo(id);
                return;
            }
            if(name.endsWith(".mp3") ||name.endsWith(".wav") ||name.endsWith(".ogg")){
                openAudio(id);
                return;
            }
            if(name.endsWith(".csv")){
                openCSV(id);
                return;
            }
            if(name.endsWith(".pdf")){
                openPDF(id);
                return;
            }
            if(name.endsWith(".txt")){
                try{
                    document.getElementById("loader").style.display="flex";
                    document.getElementById("content1").style.display="none";
                    const response=await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,
                        {
                            headers:{
                                Authorization:"Bearer "+token
                            }
                        }
                    );
                    const text=await response.text();
                    editor.innerHTML=text;
                    document.getElementById("content2").style.display="block";
                    document.getElementById("loader").style.display="none";
                    return;
                }catch(e){
                    console.error(e);
                    alert("فشل فتح الملف");
                    document.getElementById("content1").style.display="block";
                }
                document.getElementById("loader").style.display="none";
            }
        }
        async function uploadFile(){
            if(!token){return}
            const file=upload.files[0]
            if(!file){return}
            const meta={name:file.name}
            const form=new FormData()
            form.append("metadata",new Blob([JSON.stringify(meta)],{type:"application/json"}))
            form.append("file",file)
            document.getElementById("loader").style.display="flex";
            document.getElementById("content1").style.display="none";
            await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
                {
                    method:"POST",
                    headers:{
                        Authorization:"Bearer "+token
                    },
                    body:form
                }
            )
            document.getElementById("loader").style.display="none";
            document.getElementById("content1").style.display="block";
            document.getElementById("upload").value = "";
            loadFiles()
        }
        async function deleteFile(id){
            if(!confirm("Delete?")){return}
            document.getElementById("loader").style.display="flex";
            document.getElementById("content1").style.display="none";
            await fetch(`https://www.googleapis.com/drive/v3/files/${id}`,
                {
                    method:"DELETE",
                    headers:{
                        Authorization:"Bearer "+token
                    }
                }
            )
            document.getElementById("loader").style.display="none";
            document.getElementById("content1").style.display="block";
            loadFiles()
        }
        async function renameFile(id,oldName){
            const newName=prompt("New name",oldName)
            if(!newName){return}
            if(newName===oldName){return}
            document.getElementById("loader").style.display="flex";
            document.getElementById("content1").style.display="none";
            await fetch(`https://www.googleapis.com/drive/v3/files/${id}`,
                {
                    method:"PATCH",
                    headers:{
                        Authorization:"Bearer "+token,
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({name:newName})
                }
            )
            document.getElementById("loader").style.display="none";
            document.getElementById("content1").style.display="block";
            loadFiles()
        }
        function downloadFile(id){
            window.open(`https://drive.google.com/uc?id=${id}&export=download`)
        }
        function format(bytes){
            if(!bytes){return "?"}
            bytes=Number(bytes)
            const units=["B","KB","MB","GB"]
            let i=0
            while(bytes>=1024&&i<3){
                bytes/=1024
                i++
            }
            return bytes.toFixed(1)+" "+units[i]
        }
    </script>
